# ── Server ──────────────────────────────────────────────────────────────────
# Port 8081 is the cluster-facing port; 8080 is reserved for the BitNet sidecar.
server.port=8081

# ── BitNet Sidecar ──────────────────────────────────────────────────────────
# Both containers in the Pod share the same network namespace, so localhost resolves
# directly to the C++ inference engine without any cluster DNS lookup.
bitnet.sidecar.url=http://localhost:8080

# ── Actuator (Kubernetes probes) ────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.bitnet=INFO
